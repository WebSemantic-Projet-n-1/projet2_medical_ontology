<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>GO Evolution - Options</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <h1>GO Evolution</h1>
  <section>
    <label>Domaine d'intérêt</label>
    <select id="domain">
      <option value="0006281">DNA repair</option>
      <option value="0012501">Apoptose</option>
      <option value="0006629">Métabolisme des lipides</option>
    </select>
  </section>
  <section>
    <label>URL du service web</label>
    <input type="text" id="apiUrl" value="http://localhost:8000" placeholder="http://localhost:8000">
  </section>
  <section>
    <label><input type="checkbox" id="cacheEnabled" checked> Activer le cache local</label>
  </section>
  <section>
    <p>Statistiques : <span id="stats">-</span></p>
  </section>
  <button id="save">Enregistrer</button>
  <script src="popup.js"></script>
</body>
</html>
