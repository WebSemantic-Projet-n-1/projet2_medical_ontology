<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>GO Evolution - Options</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <h1>GO Evolution</h1>
  <div id="api-badge" class="api-badge api-badge--unknown">—</div>

  <section>
    <label>Domaine d'intérêt</label>
    <select id="domain">
      <option value="0006281">DNA repair</option>
      <option value="0012501">Apoptose</option>
      <option value="0006629">Métabolisme des lipides</option>
    </select>
  </section>

  <section class="inline-row">
    <label for="apiUrl">URL du service web</label>
    <input type="text" id="apiUrl" value="http://localhost:8000" placeholder="http://localhost:8000">
  </section>

  <section>
    <p class="stats-line">Statistiques : <span id="stats">-</span></p>
  </section>

  <section class="actions">
    <button id="clearCache" class="btn-secondary">Vider le cache</button>
    <button id="save">Enregistrer</button>
  </section>

  <script src="popup.js"></script>
</body>
</html>
