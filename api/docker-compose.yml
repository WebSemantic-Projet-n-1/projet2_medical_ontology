services:

  # ── Serveur Apache Jena Fuseki ───────────────────────────────────────────────
  fuseki:
    image: stain/jena-fuseki:latest
    container_name: fuseki
    ports:
      - "3030:3030"
    env_file: .env
    environment:
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      JVM_ARGS: ${JVM_ARGS}
    volumes:
      # Configuration du dataset TDB2 (graphes nommés ds/sparql, ds/query, etc.)
      - ./triplestore/config/fuseki.ttl:/fuseki/config.ttl:ro
      # Stockage persistant TDB2 — monté au niveau FUSEKI_BASE pour que
      # Docker hérite des permissions UID 9008 (user fuseki) définies dans l'image.
      - fuseki-data:/fuseki
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3030/$$/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 30s
    restart: "no"

  # ── Chargement initial des fichiers OWL (one-shot, idempotent) ───────────────
  #
  # Ce service démarre une seule fois après que Fuseki est prêt (health check),
  # charge go_2025-10.owl et go_2026-01.owl dans deux graphes nommés via le
  # Graph Store Protocol (HTTP PUT), puis s'arrête.
  #
  # Graphes créés :
  #   http://purl.obolibrary.org/obo/go/version/2025-10
  #   http://purl.obolibrary.org/obo/go/version/2026-01
  #
  # Un fichier marqueur (.data-loaded) est écrit dans le volume pour éviter
  # de recharger les données lors des redémarrages suivants.
  fuseki-loader:
    image: curlimages/curl:latest
    container_name: fuseki-loader
    depends_on:
      fuseki:
        condition: service_healthy
    # tr -d '\r' neutralise les fins de ligne CRLF si le fichier est édité sur Windows
    entrypoint: ["/bin/sh", "-c", "tr -d '\\r' < /scripts/load-data.sh | /bin/sh"]
    env_file: .env
    environment:
      FUSEKI_URL: ${FUSEKI_URL}
      FUSEKI_DATASET: ${FUSEKI_DATASET}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    volumes:
      # Fichiers OWL sources (lecture seule) — dossier data/ à la racine du projet
      - ../data:/data:ro
      # Script de chargement
      - ./triplestore/config/load-data.sh:/scripts/load-data.sh:ro
      # Volume partagé avec Fuseki — même point de montage pour que le marqueur
      # .data-loaded soit visible des deux conteneurs.
      - fuseki-data:/fuseki
    restart: "no"
  # ── Génération et chargement des graphes evo: (one-shot, idempotent) ─────────
  #
  # Parse les deux fichiers OWL avec rdflib, génère les triplets evo:,
  # puis les envoie dans Fuseki via HTTP PUT.
  # Un marqueur /marker/.rdf-built évite de recharger lors des redémarrages.
  #
  # Graphes créés :
  #   http://example.org/go/version/2025-10
  #   http://example.org/go/version/2026-01
  rdf-builder:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rdf-builder
    env_file: .env
    environment:
      FUSEKI_URL: http://fuseki:3030
      FUSEKI_DATASET: ${FUSEKI_DATASET}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      PATH_GO_NEW: /data/gene-ontology-01-26/data/ontology/go .owl
      PATH_GO_OLD: /data/gene-ontology-10-25/data/ontology/go .owl
    depends_on:
      fuseki:
        condition: service_healthy
    volumes:
      # Fichiers OWL sources (lecture seule)
      - ../data:/data:ro
      # Volume dédié au marqueur d'idempotence
      - rdf-marker:/marker
    entrypoint:
      - /bin/sh
      - -c
      - |
        if [ -f /marker/.rdf-built ]; then
          echo "[rdf-builder] Graphes evo: déjà chargés. Abandon.";
          exit 0;
        fi;
        python triplestore/build_rdf.py --upload --output-dir /tmp/rdf-output &&
        touch /marker/.rdf-built &&
        echo "[rdf-builder] Terminé."
    restart: "no"

  # ── API FastAPI ───────────────────────────────────────────────────────────────
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fastapi
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      SPARQL_ENDPOINT: http://fuseki:3030/ds/query
    depends_on:
      fuseki:
        condition: service_healthy
      rdf-builder:
        condition: service_completed_successfully
    restart: "no"

volumes:
  fuseki-data:
    name: go-fuseki-data
  rdf-marker:
    name: go-rdf-marker
